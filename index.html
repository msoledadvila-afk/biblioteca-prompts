    { title: "Comparar alternativas", desc: "Matriz de decisión.", fields: [{ id: "dec_c", label: "Decisión", placeholder: "Ej: Plataforma e-learning" },{ id: "opciones", label: "Opciones", placeholder: "Ej: Moodle, Teachable, Thinkific", type: "textarea" },{ id: "criterios", label: "Criterios", placeholder: "Ej: Precio, facilidad, soporte", type: "textarea" }], template: (f) => `Actuá como analista de negocio.\n\nContexto: "${f.dec_c}". "${f.opciones}". "${f.criterios}".\n\nTarea: Matriz 1-5, pros/contras, ganador, pregunta clave.\n\nFormato: Tabla, Pros/Contras, Recomendación.` },
    { title: "Template de reporte", desc: "Estructura recurrente.", fields: [{ id: "reporte", label: "Reporte", placeholder: "Ej: Métricas mensuales" },{ id: "datos_d", label: "Datos", placeholder: "Ej: Headcount, rotación, ausentismo", type: "textarea" },{ id: "aud_r", label: "Audiencia", placeholder: "Ej: CHRO y directores" }], template: (f) => `Actuá como analista de people analytics.\n\nContexto: "${f.reporte}". "${f.datos_d}". ${f.aud_r}.\n\nTarea: Métricas con fórmulas, visualizaciones, comparaciones.\n\nFormato: Portada, resumen, dashboards, métricas, recomendaciones.` }
  ]}
};

// ─── STYLES ─────────────────────────
const S={app:{fontFamily:"'Segoe UI',system-ui,sans-serif",background:"#F7F5F0",minHeight:"100vh",color:"#2C2C2C"},loginWrap:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:20,background:"linear-gradient(135deg,#4A3F35 0%,#5C4F3E 50%,#3D3429 100%)"},loginCard:{background:"#fff",borderRadius:16,padding:"48px 40px",maxWidth:420,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"},loginLogo:{textAlign:"center",marginBottom:32},loginTitle:{fontSize:22,fontWeight:700,color:"#4A3F35",margin:0},loginSub:{fontSize:13,color:"#8B7D6B",marginTop:4},loginBrand:{fontSize:11,color:"#C8A951",fontWeight:600,letterSpacing:2,textTransform:"uppercase",marginBottom:8},input:{width:"100%",padding:"12px 16px",border:"1.5px solid #E0D8CC",borderRadius:10,fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box",background:"#FAFAF8"},label:{display:"block",fontSize:12,fontWeight:600,color:"#6B5E4F",marginBottom:6},btnP:{width:"100%",padding:"14px",background:"linear-gradient(135deg,#C8A951,#B8963E)",color:"#fff",border:"none",borderRadius:10,fontSize:15,fontWeight:600,cursor:"pointer"},btnS:{width:"100%",padding:"12px",background:"transparent",color:"#8B7D6B",border:"1.5px solid #E0D8CC",borderRadius:10,fontSize:13,fontWeight:500,cursor:"pointer",marginTop:12},header:{background:"linear-gradient(135deg,#4A3F35,#5C4F3E)",padding:"14px 20px",color:"#fff",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8},hTitle:{fontSize:17,fontWeight:700,margin:0},hComp:{fontSize:10,color:"#C8A951",fontWeight:600,letterSpacing:1.5,textTransform:"uppercase"},hUser:{background:"rgba(200,169,81,0.15)",padding:"4px 10px",borderRadius:20,color:"#C8A951",fontSize:11},hBtn:{background:"rgba(255,255,255,0.1)",border:"none",color:"#ddd",padding:"4px 10px",borderRadius:8,cursor:"pointer",fontSize:11},catBar:{display:"flex",gap:5,padding:"10px 14px",overflowX:"auto",background:"#fff",borderBottom:"1px solid #EDE8E0",flexWrap:"wrap"},catBtn:(a,c)=>({padding:"7px 14px",borderRadius:10,border:a?"none":"1.5px solid #E0D8CC",background:a?c:"transparent",color:a?"#fff":"#6B5E4F",fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:4}),main:{maxWidth:1100,margin:"0 auto",padding:16},grid:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:10,marginTop:10},card:(s)=>({background:"#fff",borderRadius:10,padding:14,cursor:"pointer",border:s?"2px solid #C8A951":"1.5px solid #EDE8E0",boxShadow:s?"0 3px 12px rgba(200,169,81,0.12)":"none",transition:"all .15s"}),cT:{fontSize:13,fontWeight:700,margin:0},cD:{fontSize:11,color:"#8B7D6B",marginTop:3,lineHeight:1.4},cN:{display:"inline-block",background:"#F7F5F0",padding:"1px 6px",borderRadius:5,fontSize:10,fontWeight:700,color:"#B8963E",marginBottom:5},builder:{background:"#fff",borderRadius:12,padding:24,marginTop:16,border:"1.5px solid #EDE8E0"},bT:{fontSize:17,fontWeight:700,margin:0},bD:{fontSize:12,color:"#8B7D6B",marginTop:3},fG:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:16},fF:{gridColumn:"1 / -1"},ta:{width:"100%",padding:"10px 14px",border:"1.5px solid #E0D8CC",borderRadius:10,fontSize:13,fontFamily:"inherit",outline:"none",resize:"vertical",minHeight:70,boxSizing:"border-box",background:"#FAFAF8"},oB:{marginTop:16,background:"#FAFAF8",borderRadius:10,border:"1.5px solid #E0D8CC",overflow:"hidden"},oH:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",background:"#F0EDE5",borderBottom:"1px solid #E0D8CC"},oL:{fontSize:11,fontWeight:600,color:"#6B5E4F"},cpB:{padding:"5px 14px",background:"#C8A951",color:"#fff",border:"none",borderRadius:7,fontSize:11,fontWeight:600,cursor:"pointer"},oT:{padding:14,fontSize:13,lineHeight:1.65,whiteSpace:"pre-wrap"},lS:{background:"#fff",borderRadius:12,padding:24,marginTop:24,border:"1.5px dashed #C8A951"},cG:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:14},cB:(l)=>{const c={C:"#C8A951",R:"#4A90D9",E:"#5B8C5A",F:"#D4694A"};return{display:"inline-block",width:24,height:24,borderRadius:6,background:c[l],color:"#fff",textAlign:"center",lineHeight:"24px",fontSize:11,fontWeight:700,marginRight:5}},ft:{textAlign:"center",padding:"24px 16px",color:"#8B7D6B",fontSize:11,borderTop:"1px solid #EDE8E0",marginTop:28},tag:(c)=>({display:"inline-block",padding:"2px 8px",borderRadius:5,fontSize:10,fontWeight:600,background:c+"18",color:c}),err:{color:"#D4694A",fontSize:13,marginTop:8,fontWeight:500},aP:{background:"#FFF9EB",borderRadius:12,padding:20,marginTop:16,border:"1px solid #F0E0B0"},aS:{display:"flex",gap:10,flexWrap:"wrap"},aI:{background:"#fff",padding:"8px 14px",borderRadius:10,border:"1px solid #F0E0B0",flex:1,minWidth:100},aN:{fontSize:20,fontWeight:700,color:"#C8A951"},aL:{fontSize:10,color:"#8B7D6B",marginTop:1},uI:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",background:"#fff",borderRadius:7,marginBottom:3,border:"1px solid #F0E0B0",fontSize:12},rB:{background:"#D4694A",color:"#fff",border:"none",borderRadius:5,padding:"3px 8px",fontSize:10,cursor:"pointer",fontWeight:600}};

// ─── APP ────────────────────────────
function App(){
  const [screen,setScreen]=useState("code"); // code | login | app
  const [companyCode,setCompanyCode]=useState(null);
  const [config,setConfig]=useState(null);
  const [st,setSt]=useState(null); // store instance
  const [users,setUsers]=useState([]);
  const [currentUser,setCU]=useState(null);
  const [error,setError]=useState("");
  const [aCat,setACat]=useState(null);
  const [selP,setSelP]=useState(null);
  const [fV,setFV]=useState({});
  const [genP,setGenP]=useState("");
  const [copied,setCopied]=useState(false);
  const [libre,setLibre]=useState({C:"",R:"",E:"",F:""});
  const [libreOut,setLibreOut]=useState("");
  const [libCop,setLibCop]=useState(false);
  const [showAdm,setShowAdm]=useState(false);

  const copy=(t,s)=>{try{const a=document.createElement("textarea");a.value=t;a.style.position="fixed";a.style.left="-9999px";document.body.appendChild(a);a.select();document.execCommand("copy");document.body.removeChild(a);s(true);setTimeout(()=>s(false),2000);}catch(e){try{navigator.clipboard.writeText(t).then(()=>{s(true);setTimeout(()=>s(false),2000);});}catch{}}};

  // ─── Access Code Screen ───────
  const CodeScreen=()=>{
    const [code,setCode]=useState("");
    const go=()=>{
      setError("");
      const upper=code.trim().toUpperCase();
      const emp=EMPRESAS[upper];
      if(!emp){setError("Código de acceso inválido. Verificá con tu administrador.");return;}
      const s=makeStore(upper);
      setCompanyCode(upper);setConfig(emp);setSt(s);
      setUsers(s.get("users")||[]);
      setScreen("login");
    };
    return(<div style={S.loginWrap}><div style={S.loginCard}>
      <div style={S.loginLogo}>
        <div style={S.loginBrand}>Talento Impulsa</div>
        <div style={S.loginTitle}>Prompt Studio PCA™</div>
        <div style={{...S.loginSub,marginTop:8}}>Ingresá el código de acceso proporcionado por tu empresa</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <div><label style={S.label}>Código de acceso</label><input style={{...S.input,textAlign:"center",fontSize:18,letterSpacing:3,fontWeight:700}} value={code} onChange={e=>setCode(e.target.value.toUpperCase())} placeholder="XXXXXXXX" maxLength={20} onKeyDown={e=>{if(e.key==="Enter")go();}}/></div>
        {error&&<div style={S.err}>{error}</div>}
        <button style={S.btnP} onClick={go}>Ingresar</button>
        <div style={{fontSize:10,color:"#B0A898",textAlign:"center",marginTop:4}}>¿No tenés código? Consultá a tu referente de capacitación.</div>
      </div>
    </div></div>);
  };

  // ─── Login Screen ─────────────
  const LoginScreen=()=>{
    const [nm,setNm]=useState("");const [em,setEm]=useState("");const [adm,setAdm]=useState(false);const [ap,setAp]=useState("");
    const go=()=>{setError("");
      if(adm){if(ap===config.adminPass){setCU({name:"Admin",email:"admin",isAdmin:true});setScreen("app");}else setError("Contraseña incorrecta");return;}
      if(!nm.trim()||!em.trim()){setError("Completá nombre y email");return;}
      const ex=users.find(u=>u.email.toLowerCase()===em.trim().toLowerCase());
      if(ex){setCU(ex);setScreen("app");return;}
      if(users.length>=config.maxUsers){setError("Límite de "+config.maxUsers+" usuarios alcanzado.");return;}
      const nu={name:nm.trim(),email:em.trim().toLowerCase(),isAdmin:false,joinedAt:new Date().toISOString()};
      const up=[...users,nu];setUsers(up);st.set("users",up);setCU(nu);setScreen("app");
    };
    return(<div style={S.loginWrap}><div style={S.loginCard}>
      <div style={S.loginLogo}>
        <div style={S.loginBrand}>Talento Impulsa</div>
        <div style={S.loginTitle}>Prompt Studio PCA™</div>
        <div style={{fontSize:15,fontWeight:600,color:"#C8A951",marginTop:8}}>{config.company}</div>
        <div style={{...S.tag("#5B8C5A"),marginTop:10}}>Método PCA™ · C.R.E.F.</div>
      </div>
      {!adm?(<div style={{display:"flex",flexDirection:"column",gap:16}}>
        <div><label style={S.label}>Tu nombre completo</label><input style={S.input} value={nm} onChange={e=>setNm(e.target.value)} placeholder="Ej: María González"/></div>
        <div><label style={S.label}>Tu email corporativo</label><input style={S.input} type="email" value={em} onChange={e=>setEm(e.target.value)} placeholder="Ej: maria@empresa.com"/></div>
        {error&&<div style={S.err}>{error}</div>}
        <button style={S.btnP} onClick={go}>Ingresar</button>
        <button style={S.btnS} onClick={()=>{setAdm(true);setError("");}}>Acceso administrador</button>
        <div style={{fontSize:11,color:"#B0A898",textAlign:"center"}}>{users.length}/{config.maxUsers} usuarios registrados</div>
      </div>):(<div style={{display:"flex",flexDirection:"column",gap:16}}>
        <div><label style={S.label}>Contraseña de administración</label><input style={S.input} type="password" value={ap} onChange={e=>setAp(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")go();}}/></div>
        {error&&<div style={S.err}>{error}</div>}
        <button style={S.btnP} onClick={go}>Ingresar como admin</button>
        <button style={S.btnS} onClick={()=>{setAdm(false);setError("");}}>Volver</button>
      </div>)}
    </div></div>);
  };

  if(screen==="code")return<CodeScreen/>;
  if(screen==="login")return<LoginScreen/>;

  const ck=Object.keys(CATEGORIES);
  const ac=aCat?CATEGORIES[aCat]:null;
  const ap=selP?CATEGORIES[selP.ck].prompts[selP.i]:null;
  const tot=Object.values(CATEGORIES).reduce((s,c)=>s+c.prompts.length,0);
  const logout=()=>{setCU(null);setACat(null);setSelP(null);setFV({});setGenP("");setShowAdm(false);setScreen("login");};
  const fullLogout=()=>{setCU(null);setACat(null);setSelP(null);setFV({});setGenP("");setShowAdm(false);setCompanyCode(null);setConfig(null);setSt(null);setUsers([]);setScreen("code");};

  return(<div style={S.app}>
    <div style={S.header}>
      <div><div style={S.hComp}>{config.company}</div><h1 style={S.hTitle}>Prompt Studio PCA™</h1></div>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <span style={S.hUser}>{currentUser?.isAdmin?"⚙ Admin":currentUser?.name}</span>
        {currentUser?.isAdmin&&<button style={S.hBtn} onClick={()=>setShowAdm(!showAdm)}>{showAdm?"Prompts":"Admin"}</button>}
        <button style={S.hBtn} onClick={logout}>Salir</button>
        <button style={{...S.hBtn,opacity:.6}} onClick={fullLogout} title="Cambiar empresa">✕</button>
      </div>
    </div>

    {showAdm&&currentUser?.isAdmin&&(<div style={{maxWidth:1100,margin:"0 auto",padding:16}}><div style={S.aP}>
      <div style={{fontSize:13,fontWeight:700,color:"#8B6914",marginBottom:14}}>⚙ Administración — {config.company}</div>
      <div style={S.aS}>
        <div style={S.aI}><div style={S.aN}>{users.length}</div><div style={S.aL}>Usuarios</div></div>
        <div style={S.aI}><div style={S.aN}>{config.maxUsers}</div><div style={S.aL}>Máximo</div></div>
        <div style={S.aI}><div style={S.aN}>{config.maxUsers-users.length}</div><div style={S.aL}>Cupos</div></div>
        <div style={S.aI}><div style={S.aN}>{tot}</div><div style={S.aL}>Prompts</div></div>
      </div>
      <div style={{marginTop:16}}><div style={{fontSize:12,fontWeight:700,color:"#6B5E4F"}}>Usuarios registrados</div>
        <div style={{marginTop:6,maxHeight:200,overflowY:"auto"}}>
          {users.length===0&&<div style={{fontSize:12,color:"#B0A898",padding:6}}>Sin usuarios registrados</div>}
          {users.map((u,i)=>(<div key={i} style={S.uI}><div><b>{u.name}</b> <span style={{color:"#8B7D6B",marginLeft:4}}>{u.email}</span></div><button style={S.rB} onClick={()=>{const up=users.filter(x=>x.email!==u.email);setUsers(up);st.set("users",up);}}>Eliminar</button></div>))}
        </div>
      </div>
      <button style={{...S.rB,padding:"8px 16px",fontSize:12,marginTop:16}} onClick={()=>{if(!confirm("¿Eliminar todos los usuarios de "+config.company+"?"))return;setUsers([]);st.del("users");}}>Reiniciar usuarios</button>
    </div></div>)}

    {!showAdm&&(<React.Fragment>
      <div style={S.catBar}>{ck.map(k=>(<button key={k} style={S.catBtn(aCat===k,CATEGORIES[k].color)} onClick={()=>{setACat(k);setSelP(null);setGenP("");setFV({});}}><span>{CATEGORIES[k].icon}</span>{CATEGORIES[k].label}</button>))}</div>
      <div style={S.main}>
        {!aCat&&(<div style={{textAlign:"center",padding:"40px 16px"}}><div style={{fontSize:32,marginBottom:10}}>✦</div><h2 style={{fontSize:19,fontWeight:700,color:"#4A3F35",margin:0}}>Bienvenido al Prompt Studio PCA™</h2><p style={{color:"#8B7D6B",fontSize:13,marginTop:6,maxWidth:460,margin:"6px auto 0"}}>{tot} prompts en {ck.length} categorías con sistema C.R.E.F.</p><div style={{display:"flex",justifyContent:"center",gap:6,marginTop:16,flexWrap:"wrap"}}>{["C · Contexto","R · Rol","E · Especificación","F · Formato"].map((t,i)=>(<span key={i} style={S.tag(["#C8A951","#4A90D9","#5B8C5A","#D4694A"][i])}>{t}</span>))}</div></div>)}

        {aCat&&ac&&(<React.Fragment><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{fontSize:24}}>{ac.icon}</span><div><div style={{fontSize:13,fontWeight:700,color:"#6B5E4F"}}>{ac.label}</div><div style={{fontSize:11,color:"#B0A898"}}>{ac.prompts.length} prompts</div></div></div>
          <div style={S.grid}>{ac.prompts.map((p,i)=>(<div key={i} style={S.card(selP?.ck===aCat&&selP?.i===i)} onClick={()=>{setSelP({ck:aCat,i});setFV({});setGenP("");setCopied(false);}}><div style={S.cN}>#{i+1}</div><div style={S.cT}>{p.title}</div><div style={S.cD}>{p.desc}</div></div>))}</div></React.Fragment>)}

        {ap&&(<div style={S.builder}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}><div><div style={S.bT}>{ap.title}</div><div style={S.bD}>{ap.desc}</div></div><span style={S.tag(CATEGORIES[selP.ck].color)}>C.R.E.F.</span></div>
          <div style={S.fG}>{ap.fields.map((f,i)=>(<div key={i} style={f.type==="textarea"?S.fF:{}}><label style={S.label}>{f.label}</label>{f.type==="textarea"?<textarea style={S.ta} placeholder={f.placeholder} value={fV[f.id]||""} onChange={e=>setFV({...fV,[f.id]:e.target.value})}/>:<input style={S.input} placeholder={f.placeholder} value={fV[f.id]||""} onChange={e=>setFV({...fV,[f.id]:e.target.value})}/>}</div>))}</div>
          <div style={{display:"flex",gap:8,marginTop:16}}><button style={{...S.btnP,width:"auto",padding:"10px 24px"}} onClick={()=>{const p=CATEGORIES[selP.ck].prompts[selP.i];const v={};p.fields.forEach(f=>{v[f.id]=fV[f.id]||"["+f.label+"]";});setGenP(p.template(v));}}>✦ Generar Prompt</button><button style={{...S.btnS,width:"auto",padding:"8px 18px",marginTop:0}} onClick={()=>{setFV({});setGenP("");}}>↺ Reiniciar</button></div>
          {genP&&(<div style={S.oB}><div style={S.oH}><span style={S.oL}>Prompt generado</span><button style={S.cpB} onClick={()=>copy(genP,setCopied)}>{copied?"✓ Copiado":"Copiar"}</button></div><div style={S.oT}>{genP}</div></div>)}
        </div>)}

        {aCat&&(<div style={S.lS}>
          <div style={{fontSize:15,fontWeight:700}}>✦ Constructor Libre C.R.E.F.</div><p style={{fontSize:11,color:"#8B7D6B",marginTop:3}}>Construí cualquier prompt desde cero</p>
          <div style={S.cG}>{[{k:"C",l:"Contexto",h:"¿Situación?",p:"Ej: Soy gerente de ventas..."},{k:"R",l:"Rol",h:"¿Papel IA?",p:"Ej: Actuá como consultor..."},{k:"E",l:"Especificación",h:"¿Qué hacer?",p:"Ej: Redactá una propuesta..."},{k:"F",l:"Formato",h:"¿Cómo presentar?",p:"Ej: Documento con encabezado..."}].map(t=>(<div key={t.k}><label style={S.label}><span style={S.cB(t.k)}>{t.k}</span>{t.l} <span style={{fontWeight:400,color:"#B0A898"}}>— {t.h}</span></label><textarea style={S.ta} rows={3} placeholder={t.p} value={libre[t.k]} onChange={e=>setLibre({...libre,[t.k]:e.target.value})}/></div>))}</div>
          <div style={{display:"flex",gap:8,marginTop:14}}><button style={{...S.btnP,width:"auto",padding:"10px 24px"}} onClick={()=>{const p=[];if(libre.R)p.push(libre.R);if(libre.C)p.push("\nContexto: "+libre.C);if(libre.E)p.push("\nTarea: "+libre.E);if(libre.F)p.push("\nFormato: "+libre.F);setLibreOut(p.join("\n")||"Completá al menos un campo.");}}>✦ Generar C.R.E.F.</button><button style={{...S.btnS,width:"auto",padding:"8px 18px",marginTop:0}} onClick={()=>{setLibre({C:"",R:"",E:"",F:""});setLibreOut("");}}>↺ Reiniciar</button></div>
          {libreOut&&(<div style={{...S.oB,marginTop:14}}><div style={S.oH}><span style={S.oL}>Prompt C.R.E.F.</span><button style={S.cpB} onClick={()=>copy(libreOut,setLibCop)}>{libCop?"✓ Copiado":"Copiar"}</button></div><div style={S.oT}>{libreOut}</div></div>)}
        </div>)}

        <div style={S.ft}>
          <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>{["C · Contexto","R · Rol","E · Especificación","F · Formato"].map((t,i)=>(<span key={i} style={S.tag(["#C8A951","#4A90D9","#5B8C5A","#D4694A"][i])}>{t}</span>))}</div>
          <p style={{margin:0}}>Prompt Studio PCA™ · <strong>Talento Impulsa Consulting</strong></p>
          <p style={{margin:"3px 0 0",fontSize:10,opacity:.5}}>{tot} prompts · {ck.length} categorías · Constructor libre C.R.E.F.</p>
        </div>
      </div>
    </React.Fragment>)}
  </div>);
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
