/* ═══════════════════════════════════════════════════════════

// ─── Storage helpers (localStorage) ─────────────────────────
const store = {
  get: (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  del: (k) => { try { localStorage.removeItem(k); } catch {} }
};

// ─── CATEGORIES DATA ────────────────────────────────────────
const CATEGORIES = {
  ventas: {
    icon: "💼", label: "Ventas", color: "#C8A951",
    prompts: [
      { title: "Propuesta comercial personalizada", desc: "Generá una propuesta adaptada al perfil del prospecto.", fields: [{ id: "empresa", label: "Empresa del prospecto", placeholder: "Ej: Laboratorio farmacéutico de 500 empleados" },{ id: "necesidad", label: "Necesidad detectada", placeholder: "Ej: Reducir tiempo de onboarding de vendedores", type: "textarea" },{ id: "producto", label: "Tu producto/servicio", placeholder: "Ej: Plataforma de capacitación con IA" },{ id: "diferencial", label: "Diferencial competitivo", placeholder: "Ej: Personalización por rol + métricas en tiempo real" }], template: (f) => `Actuá como un consultor de ventas B2B con experiencia en la industria de ${f.empresa}.\n\nContexto: Estoy preparando una propuesta para ${f.empresa}. Necesidad: "${f.necesidad}". Mi producto: ${f.producto}.\n\nTarea: Redactá una propuesta de 1 página que conecte la necesidad con mi solución. Destacá: ${f.diferencial}. Incluí ROI estimado y próximos pasos.\n\nFormato: Resumen ejecutivo (3 líneas), problemática, solución, beneficios (3-4), ROI y call to action.` },
      { title: "Email de seguimiento post-reunión", desc: "Follow-up profesional que mantenga el momentum.", fields: [{ id: "contacto", label: "Nombre del contacto", placeholder: "Ej: María González, Directora de RRHH" },{ id: "temas", label: "Temas tratados", placeholder: "Ej: Rotación del equipo comercial y falta de herramientas", type: "textarea" },{ id: "compromiso", label: "Próximo paso acordado", placeholder: "Ej: Enviar demo personalizada" },{ id: "plazo", label: "Plazo", placeholder: "Ej: Esta semana" }], template: (f) => `Actuá como un ejecutivo de ventas consultivas.\n\nContexto: Reunión con ${f.contacto}. Temas: "${f.temas}". Próximo paso: ${f.compromiso}, plazo: ${f.plazo}.\n\nTarea: Email de seguimiento que resuma puntos clave, refuerce el valor y confirme próximo paso con fecha.\n\nFormato: Email con asunto, saludo, 3 párrafos (resumen, valor, próximo paso), cierre. Tono consultivo.` },
      { title: "Manejo de objeción de precio", desc: "Respondé a 'es muy caro' con argumentos de valor.", fields: [{ id: "objecion", label: "Objeción exacta", placeholder: "Ej: 'El presupuesto no nos da este trimestre'", type: "textarea" },{ id: "valor", label: "Valor que entrega tu solución", placeholder: "Ej: Ahorro de 10hs semanales, reducción de errores 40%" },{ id: "alternativa", label: "Alternativa que podés ofrecer", placeholder: "Ej: Implementación por fases con equipo piloto" }], template: (f) => `Actuá como un coach de ventas en negociación.\n\nContexto: Objeción: "${f.objecion}". Valor: ${f.valor}. Alternativa: ${f.alternativa}.\n\nTarea: 3 respuestas diferentes: una directa, otra consultiva, otra con alternativa. Cada una reconoce la preocupación, reformula como inversión con ROI, ofrece camino.\n\nFormato: 3 bloques: enfoque (1 línea), respuesta (2-3 párrafos), tip de ejecución.` },
      { title: "Script de llamada en frío", desc: "Estructurá una llamada que abra conversaciones.", fields: [{ id: "target", label: "Perfil del decisor", placeholder: "Ej: Gerente de Operaciones en logística" },{ id: "dolor", label: "Problema que resolvés", placeholder: "Ej: Procesos manuales que consumen 15hs semanales" },{ id: "gancho", label: "Dato o caso de éxito", placeholder: "Ej: Reducimos 60% el tiempo de reportes" }], template: (f) => `Actuá como especialista en ventas outbound B2B.\n\nContexto: Llamar a ${f.target}. Problema: "${f.dolor}". Dato: "${f.gancho}".\n\nTarea: Script de 90 segundos: apertura con curiosidad, pregunta diagnóstico, valor breve, cierre con reunión. 2 variantes para "no tengo tiempo".\n\nFormato: Script con indicaciones [pausa], [esperar respuesta]. Al final, 2 variantes de rechazo.` },
      { title: "Análisis competitivo (battle card)", desc: "Diferenciáte de un competidor con argumentos claros.", fields: [{ id: "competidor", label: "Competidor", placeholder: "Ej: Consultora XYZ" },{ id: "fortalezas_comp", label: "Fortalezas del competidor", placeholder: "Ej: Mayor trayectoria, precios bajos", type: "textarea" },{ id: "tus_fortalezas", label: "Tus fortalezas", placeholder: "Ej: Personalización, metodología propia", type: "textarea" }], template: (f) => `Actuá como estratega de ventas en inteligencia competitiva.\n\nContexto: Compito con ${f.competidor}. Sus fortalezas: "${f.fortalezas_comp}". Las mías: "${f.tus_fortalezas}".\n\nTarea: Battle card con: reconocer al competidor sin descalificar, 3 preguntas que expongan debilidades, 3 argumentos de diferenciación, frases de transición.\n\nFormato: Tabla con 4 secciones. Lenguaje profesional.` },
      { title: "Reactivación de lead frío", desc: "Recontactá un prospecto que dejó de responder.", fields: [{ id: "lead", label: "Contexto del lead", placeholder: "Ej: Carlos, Gerente RRHH, habíamos hablado hace 2 meses" },{ id: "ultima", label: "Última interacción", placeholder: "Ej: Le envié propuesta y no respondió", type: "textarea" },{ id: "novedad", label: "Novedad para reactivar", placeholder: "Ej: Nuevo caso de éxito en su industria" }], template: (f) => `Actuá como especialista en reactivación de leads B2B.\n\nContexto: Lead frío: ${f.lead}. Última interacción: "${f.ultima}". Novedad: "${f.novedad}".\n\nTarea: 2 emails de reactivación. Uno con la novedad como gancho. Otro con enfoque "solo quiero saber si sigue siendo relevante". Breves, sin presión, CTA suave.\n\nFormato: 2 emails completos con asunto y cuerpo. Indicá cuándo usar cada uno.` },
      { title: "Caso de éxito que venda", desc: "Convertí resultados reales en una historia convincente.", fields: [{ id: "cliente_caso", label: "Cliente (anonimizado)", placeholder: "Ej: Empresa de logística de 200 empleados" },{ id: "problema_caso", label: "Problema que tenían", placeholder: "Ej: Perdían 30hs semanales en reportes manuales", type: "textarea" },{ id: "solucion_caso", label: "Qué implementaste", placeholder: "Ej: Pack PCA con 30 prompts + protocolo" },{ id: "resultado_caso", label: "Resultados concretos", placeholder: "Ej: Ahorro de 8hs/persona, 90% adopción en 2 semanas" }], template: (f) => `Actuá como copywriter B2B de case studies.\n\nContexto: Caso con ${f.cliente_caso}. Problema: "${f.problema_caso}". Solución: "${f.solucion_caso}". Resultados: "${f.resultado_caso}".\n\nTarea: Case study en storytelling (problema → solución → resultado). Convincente sin exagerar, datos concretos, reflexión que conecte con otros prospectos.\n\nFormato: 1 página con título, resumen (3 líneas), desafío, solución, resultados (números), quote placeholder, CTA.` },
      { title: "Negociación de contrato", desc: "Prepará argumentos para negociar términos.", fields: [{ id: "punto", label: "Punto a negociar", placeholder: "Ej: El cliente quiere 20% descuento sin cambiar alcance" },{ id: "posicion", label: "Tu posición ideal", placeholder: "Ej: Mantener precio, ofrecer valor extra", type: "textarea" },{ id: "limite", label: "Tu límite mínimo", placeholder: "Ej: Máx 10% descuento con reducción de alcance" }], template: (f) => `Actuá como negociador comercial B2B.\n\nContexto: Negociación. Punto: "${f.punto}". Mi posición: "${f.posicion}". Límite: "${f.limite}".\n\nTarea: Estrategia con: 3 argumentos para mi posición, 2 concesiones sin perder margen, 1 propuesta de compromiso creativa, frases exactas.\n\nFormato: Plan con posición inicial, argumentos, concesiones, compromiso, script de frases clave.` }
    ]
  },
  marketing: { icon: "📣", label: "Marketing", color: "#4A90D9", prompts: [
    { title: "Post de LinkedIn con storytelling", desc: "Post que conecte emocionalmente y genere engagement.", fields: [{ id: "tema", label: "Tema central", placeholder: "Ej: Cómo la IA me ayudó a recuperar 8hs" },{ id: "historia", label: "Anécdota real", placeholder: "Ej: Un martes estuve hasta las 22hs haciendo reportes", type: "textarea" },{ id: "audiencia", label: "Audiencia", placeholder: "Ej: Profesionales de RRHH y líderes" },{ id: "cta", label: "Call to action", placeholder: "Ej: Que comenten su experiencia" }], template: (f) => `Actuá como copywriter de LinkedIn con storytelling.\n\nContexto: Post sobre "${f.tema}". Experiencia: "${f.historia}". Audiencia: ${f.audiencia}.\n\nTarea: Post de 200-300 palabras. Hook potente en 2 líneas. Anécdota. Insight. CTA: ${f.cta}.\n\nFormato: Listo para LinkedIn. Saltos de línea. Máx 2-3 emojis. 2 hashtags. Tono profesional y humano.` },
    { title: "Carrusel de Instagram educativo", desc: "Carrusel de 7 slides con tips prácticos.", fields: [{ id: "topico", label: "Tópico", placeholder: "Ej: 5 formas de usar IA" },{ id: "nivel", label: "Nivel audiencia", placeholder: "Ej: Principiantes" },{ id: "marca", label: "Tu marca", placeholder: "Ej: Talento Impulsa" }], template: (f) => `Actuá como content strategist de Instagram.\n\nContexto: Carrusel de 7 slides sobre "${f.topico}". Nivel: ${f.nivel}. Marca: ${f.marca}.\n\nTarea: Slide 1 (portada), 2-6 (tip con ejemplo), 7 (CTA + branding). Caption 100-150 palabras.\n\nFormato: 7 slides con título y texto (máx 30 palabras/slide). Caption. Tono educativo.` },
    { title: "Email de nurturing para leads", desc: "Email que eduque y acerque a la conversión.", fields: [{ id: "etapa", label: "Etapa del lead", placeholder: "Ej: Descargó PDF hace 3 días" },{ id: "valor", label: "Valor a entregar", placeholder: "Ej: Tip de productividad con IA", type: "textarea" },{ id: "oferta", label: "Hacia dónde dirigirlo", placeholder: "Ej: Demo del Prompt Studio" }], template: (f) => `Actuá como especialista en email marketing.\n\nContexto: Lead en: "${f.etapa}". Valor: "${f.valor}". Objetivo: ${f.oferta}.\n\nTarea: Email 80% contenido útil, 20% invitación suave.\n\nFormato: 2 asuntos, preheader, saludo, 3 párrafos, cierre. Máx 200 palabras. Tono cercano.` },
    { title: "Calendario de contenido mensual", desc: "Planificá un mes de contenidos.", fields: [{ id: "objetivo", label: "Objetivo del mes", placeholder: "Ej: Visibilidad + 10 consultas" },{ id: "canales", label: "Canales", placeholder: "Ej: LinkedIn, Instagram, WhatsApp" },{ id: "pilares", label: "Pilares de contenido", placeholder: "Ej: Educación, Casos, Behind the scenes, Conversión", type: "textarea" }], template: (f) => `Actuá como social media strategist B2B.\n\nContexto: Objetivo: "${f.objetivo}". Canales: ${f.canales}. Pilares: "${f.pilares}".\n\nTarea: Calendario 4 semanas, 3-4 posts/semana. Regla 40-30-20-10.\n\nFormato: Tabla: Día | Canal | Pilar | Formato | Tema | CTA. 3 tips al final.` },
    { title: "Copy para landing page", desc: "Textos de una landing que convierta.", fields: [{ id: "servicio", label: "Servicio", placeholder: "Ej: Pack Autonomía PCA™" },{ id: "problema", label: "Problema del cliente", placeholder: "Ej: Pierde 10+ hs en tareas repetitivas", type: "textarea" },{ id: "beneficios", label: "3 beneficios", placeholder: "Ej: Ahorro tiempo, seguridad, resultados", type: "textarea" }], template: (f) => `Actuá como copywriter de conversión B2B.\n\nContexto: Landing de "${f.servicio}". Problema: "${f.problema}". Beneficios: "${f.beneficios}".\n\nTarea: Headline (máx 10 palabras), subheadline, problema, solución, beneficios, cómo funciona, FAQ (3), CTA.\n\nFormato: Secciones etiquetadas [HERO], [PROBLEMA], etc.` },
    { title: "Guión para Reel / video corto", desc: "Guión para video de 60 segundos.", fields: [{ id: "tema_v", label: "Tema", placeholder: "Ej: El error #1 al usar ChatGPT" },{ id: "formato_v", label: "Formato", placeholder: "Ej: Hablando a cámara" },{ id: "cta_v", label: "Acción deseada", placeholder: "Ej: Que me sigan" }], template: (f) => `Actuá como creador de videos cortos.\n\nContexto: Video 60 seg sobre "${f.tema_v}". Formato: ${f.formato_v}. CTA: ${f.cta_v}.\n\nTarea: Guión con hook 3 seg, desarrollo, dato sorprendente, cierre CTA.\n\nFormato: Segundo a segundo con [CORTE], [ZOOM], [TEXTO]. 2 opciones de hook.` },
    { title: "Secuencia de WhatsApp Status", desc: "Estados que cuenten una historia.", fields: [{ id: "obj_wa", label: "Objetivo", placeholder: "Ej: Curiosidad sobre nuevo servicio" },{ id: "dias", label: "Días", placeholder: "Ej: 5 días, 2 estados/día" },{ id: "culmina", label: "Culmina en", placeholder: "Ej: Invitación a call" }], template: (f) => `Actuá como estratega de WhatsApp.\n\nContexto: Secuencia de estados. Objetivo: "${f.obj_wa}". Duración: ${f.dias}. Culmina: "${f.culmina}".\n\nTarea: Narrativa progresiva: curiosidad → valor → CTA.\n\nFormato: Tabla: Día | Estado # | Tipo | Contenido | Objetivo.` },
    { title: "Propuesta de co-marketing", desc: "Acción conjunta con otra marca.", fields: [{ id: "partner", label: "Marca partner", placeholder: "Ej: Consultora RRHH con 5000 seguidores" },{ id: "tipo", label: "Tipo colaboración", placeholder: "Ej: Webinar conjunto" },{ id: "beneficio", label: "Beneficio mutuo", placeholder: "Ej: Audiencia + contenido técnico", type: "textarea" }], template: (f) => `Actuá como especialista en partnerships B2B.\n\nContexto: Colaboración con ${f.partner}. Tipo: "${f.tipo}". Beneficio: "${f.beneficio}".\n\nTarea: Mensaje breve que muestre investigación, beneficio para ellos, idea concreta, próximo paso fácil.\n\nFormato: 150-200 palabras para LinkedIn o email. Tono profesional.` }
  ]},
  rrhh: { icon: "👥", label: "RRHH", color: "#5B8C5A", prompts: [
    { title: "Descripción de puesto optimizada", desc: "Job description inclusiva y atractiva.", fields: [{ id: "puesto", label: "Puesto", placeholder: "Ej: Analista de Datos Sr" },{ id: "area", label: "Área", placeholder: "Ej: BI, reporta al Gerente" },{ id: "requisitos", label: "Requisitos", placeholder: "Ej: 3+ años, SQL, Power BI", type: "textarea" },{ id: "cultura", label: "Cultura", placeholder: "Ej: Fintech, híbrido" }], template: (f) => `Actuá como especialista en atracción de talento.\n\nContexto: Puesto de ${f.puesto} en ${f.area}. Requisitos: "${f.requisitos}". Cultura: ${f.cultura}.\n\nTarea: Descripción atractiva, inclusiva, lenguaje neutro. Diferenciar excluyentes y deseables.\n\nFormato: Sobre nosotros, El rol, Responsabilidades (5-6), Excluyentes (4-5), Deseables (3), Qué ofrecemos (4-5).` },
    { title: "Feedback de desempeño", desc: "Devolución equilibrada y accionable.", fields: [{ id: "nombre", label: "Colaborador", placeholder: "Ej: Juan" },{ id: "fortalezas", label: "Fortalezas", placeholder: "Ej: Trabajo en equipo, deadlines", type: "textarea" },{ id: "mejoras", label: "Mejoras", placeholder: "Ej: Comunicación escrita, priorización", type: "textarea" },{ id: "objetivo", label: "Objetivo próximo", placeholder: "Ej: Liderar proyecto cross" }], template: (f) => `Actuá como coach de feedback.\n\nContexto: Feedback para ${f.nombre}. Fortalezas: "${f.fortalezas}". Mejoras: "${f.mejoras}". Objetivo: ${f.objetivo}.\n\nTarea: Modelo SBI. Equilibrado, con plan de acción (2-3 acciones).\n\nFormato: Reconocimiento, Desarrollo, Plan acción, Cierre. Máx 400 palabras.` },
    { title: "Comunicado de cambio organizacional", desc: "Comunicado claro y empático.", fields: [{ id: "cambio", label: "El cambio", placeholder: "Ej: Nueva política híbrida", type: "textarea" },{ id: "motivo", label: "Motivo", placeholder: "Ej: Encuesta de clima" },{ id: "impacto", label: "Impacto", placeholder: "Ej: Desde el 1° del mes" },{ id: "emisor", label: "Firma", placeholder: "Ej: People & Culture" }], template: (f) => `Actuá como experto en comunicación organizacional.\n\nContexto: Cambio: "${f.cambio}". Motivo: "${f.motivo}". Impacto: "${f.impacto}". Firma: ${f.emisor}.\n\nTarea: Comunicado transparente, empático. Porqué antes del qué.\n\nFormato: Asunto, saludo, contexto, cambio, implementación, consultas, cierre. Máx 300 palabras.` },
    { title: "Guía de onboarding", desc: "Primeros 5 días de un nuevo ingreso.", fields: [{ id: "rol", label: "Rol", placeholder: "Ej: Analista de Marketing" },{ id: "equipo", label: "Equipo", placeholder: "Ej: Marketing, reporta a Carolina" },{ id: "herramientas", label: "Herramientas", placeholder: "Ej: Slack, HubSpot, Canva" }], template: (f) => `Actuá como especialista en onboarding.\n\nContexto: Ingresa ${f.rol} a ${f.equipo}. Herramientas: ${f.herramientas}.\n\nTarea: Plan 5 días con actividades, responsable, objetivo. Buddy check-in.\n\nFormato: Tabla Lunes-Viernes: Horario | Actividad | Responsable | Objetivo. Checklist.` },
    { title: "Encuesta de clima laboral", desc: "Encuesta con preguntas efectivas.", fields: [{ id: "dimensiones", label: "Dimensiones", placeholder: "Ej: Liderazgo, comunicación, bienestar", type: "textarea" },{ id: "formato_e", label: "Formato", placeholder: "Ej: Likert 1-5 + 2 abiertas" },{ id: "contexto_o", label: "Contexto", placeholder: "Ej: 200 personas, post-reestructuración" }], template: (f) => `Actuá como consultor en desarrollo organizacional.\n\nContexto: Clima. Dimensiones: "${f.dimensiones}". Formato: ${f.formato_e}. Contexto: "${f.contexto_o}".\n\nTarea: 3-4 preguntas/dimensión, claras, comportamientos observables. 2 abiertas.\n\nFormato: Por dimensión con escala. Tips para tasa de respuesta.` },
    { title: "Plan de offboarding", desc: "Desvinculación profesional y humana.", fields: [{ id: "tipo_off", label: "Tipo", placeholder: "Ej: Reestructuración" },{ id: "antig", label: "Antigüedad", placeholder: "Ej: 5 años, Coordinador" },{ id: "benef", label: "Beneficios salida", placeholder: "Ej: Indemnización + outplacement" }], template: (f) => `Actuá como especialista en offboarding.\n\nContexto: "${f.tipo_off}". Perfil: ${f.antig}. Beneficios: "${f.benef}".\n\nTarea: Guión conversación, checklist admin, plan transición, comunicado equipo.\n\nFormato: 4 secciones con frases exactas y plantillas.` },
    { title: "Programa de referidos", desc: "Programa de recomendación de candidatos.", fields: [{ id: "emp_ref", label: "Empresa", placeholder: "Ej: Tech, 300 empleados" },{ id: "incentivo", label: "Incentivo", placeholder: "Ej: Bono $50K" },{ id: "puestos_dif", label: "Puestos difíciles", placeholder: "Ej: Developers, data scientists" }], template: (f) => `Actuá como especialista en talent acquisition.\n\nContexto: ${f.emp_ref}. Incentivo: ${f.incentivo}. Puestos: "${f.puestos_dif}".\n\nTarea: Programa con nombre, reglas, proceso, comunicación, métricas.\n\nFormato: Nombre, reglas, email lanzamiento, FAQ, dashboard.` },
    { title: "Entrevista por competencias STAR", desc: "Guía de entrevista estructurada.", fields: [{ id: "puesto_e", label: "Puesto", placeholder: "Ej: Gerente de Proyecto" },{ id: "comp_e", label: "Competencias", placeholder: "Ej: Liderazgo, conflictos, tiempo", type: "textarea" },{ id: "nivel_e", label: "Seniority", placeholder: "Ej: Senior, 5+ años" }], template: (f) => `Actuá como especialista en selección STAR.\n\nContexto: ${f.puesto_e}, nivel ${f.nivel_e}. Competencias: "${f.comp_e}".\n\nTarea: 2 preguntas STAR/competencia, señales +/-, rúbrica 1-5.\n\nFormato: Apertura, preguntas (tabla), rúbrica, cierre.` }
  ]},
  atencion: { icon: "🎧", label: "Atención al Cliente", color: "#D4694A", prompts: [

    { title: "Informe ejecutivo semanal", desc: "Updates sueltas a informe profesional.", fields: [{ id: "updates", label: "Actualizaciones", placeholder: "Ej: 2 ventas, campaña, se fue developer...", type: "textarea" },{ id: "aud_i", label: "Quién lo lee", placeholder: "Ej: Mi jefe y directorio" },{ id: "foco", label: "Foco", placeholder: "Ej: Objetivos Q1" }], template: (f) => `Actuá como consultor en reportes.\n\nContexto: Para ${f.aud_i}. Foco: "${f.foco}".\n\nUpdates:\n"${f.updates}"\n\nTarea: Informe con semáforo verde/amarillo/rojo.\n\nFormato: Resumen, Logros, Riesgos, Métricas, Prioridades. Máx 1 página.` },
    { title: "Minuta con compromisos", desc: "Documentá conversación con próximos pasos.", fields: [{ id: "ctx_m", label: "Contexto", placeholder: "Ej: Call con cliente para alcance" },{ id: "part_m", label: "Participantes", placeholder: "Ej: Yo, PM, director técnico" },{ id: "notas_m", label: "Notas", placeholder: "Pegá notas...", type: "textarea" }], template: (f) => `Actuá como project manager.\n\nContexto: ${f.ctx_m}. ${f.part_m}.\n\nNotas:\n"${f.notas_m}"\n\nTarea: Info compartida, decisiones, compromisos (responsable + fecha).\n\nFormato: Encabezado, temas, decisiones (tabla), compromisos (tabla).` },
    { title: "Checklist de proceso", desc: "Proceso complejo a pasos claros.", fields: [{ id: "proceso", label: "Proceso", placeholder: "Ej: Alta de cliente en sistema" },{ id: "pasos", label: "Pasos conocidos", placeholder: "Ej: CRM, contrato, AFIP...", type: "textarea" },{ id: "quien_c", label: "Quién lo usa", placeholder: "Ej: Asistentes nuevos" }], template: (f) => `Actuá como consultor en procesos.\n\nContexto: "${f.proceso}" para ${f.quien_c}.\n\n"${f.pasos}"\n\nTarea: Checklist que cualquiera pueda seguir. Pasos faltantes, dependencias.\n\nFormato: Checklist: paso, descripción, responsable, herramienta. Errores comunes.` },
    { title: "Análisis comparativo", desc: "Compará alternativas para decidir.", fields: [{ id: "dec_c", label: "Decisión", placeholder: "Ej: Plataforma e-learning" },{ id: "opciones", label: "Opciones", placeholder: "Ej: Moodle, Teachable, Thinkific", type: "textarea" },{ id: "criterios", label: "Criterios", placeholder: "Ej: Precio, facilidad, soporte", type: "textarea" }], template: (f) => `Actuá como analista de negocio.\n\nContexto: "${f.dec_c}". Opciones: "${f.opciones}". Criterios: "${f.criterios}".\n\nTarea: Matriz 1-5, pros/contras, ganador, pregunta clave.\n\nFormato: Tabla, Pros/Contras, Recomendación, Siguiente paso.` },
    { title: "Template de reporte", desc: "Estructura de reporte recurrente.", fields: [{ id: "reporte", label: "Reporte", placeholder: "Ej: Métricas mensuales RRHH" },{ id: "datos_d", label: "Datos", placeholder: "Ej: Headcount, rotación, ausentismo", type: "textarea" },{ id: "aud_r", label: "Audiencia", placeholder: "Ej: CHRO y directores" }], template: (f) => `Actuá como analista de people analytics.\n\nContexto: "${f.reporte}". Datos: "${f.datos_d}". Para: ${f.aud_r}.\n\nTarea: Métricas con fórmulas, visualizaciones, comparaciones, insights.\n\nFormato: Portada, resumen, dashboards, métricas, análisis, recomendaciones.` }
  ]}
};

// ─── APP COMPONENT ──────────────────
function App() {
  const [screen, setScreen] = useState("loading");
  const [config, setConfig] = useState({ company: "", maxUsers: 10, adminPass: "" });
  const [users, setUsers] = useState([]);
  const [currentUser, setCurrentUser] = useState(null);
  const [error, setError] = useState("");
  const [activeCategory, setActiveCategory] = useState(null);
  const [selectedPrompt, setSelectedPrompt] = useState(null);
  const [fieldValues, setFieldValues] = useState({});
  const [generatedPrompt, setGeneratedPrompt] = useState("");
  const [copied, setCopied] = useState(false);
  const [libre, setLibre] = useState({ C: "", R: "", E: "", F: "" });
  const [libreOutput, setLibreOutput] = useState("");
  const [libreCopied, setLibreCopied] = useState(false);
  const [showAdmin, setShowAdmin] = useState(false);

  useEffect(() => {
    const cfg = store.get("pca_config");
    if (cfg) { setConfig(cfg); setUsers(store.get("pca_users") || []); setScreen("login"); }
    else setScreen("setup");
  }, []);

  const handleCopy = (text, setter) => {
    try { const ta = document.createElement("textarea"); ta.value = text; ta.style.position = "fixed"; ta.style.left = "-9999px"; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); setter(true); setTimeout(() => setter(false), 2000); }
    catch(e) { try { navigator.clipboard.writeText(text).then(() => { setter(true); setTimeout(() => setter(false), 2000); }); } catch(e2) {} }
  };

  // Setup
  const SetupScreen = () => {
    const [co, setCo] = useState(""); const [mx, setMx] = useState("10"); const [pw, setPw] = useState("");
    const go = () => { if (!co.trim()||!pw.trim()) { setError("Completá todos los campos"); return; } const c = { company: co.trim(), maxUsers: parseInt(mx)||10, adminPass: pw }; store.set("pca_config", c); setConfig(c); setError(""); setScreen("login"); };
    return (<div style={S.loginWrap}><div style={S.loginCard}><div style={S.loginLogo}><div style={S.loginBrand}>Talento Impulsa</div><div style={S.loginTitle}>Prompt Studio PCA™</div><div style={S.loginSub}>Configuración inicial</div></div><div style={{display:"flex",flexDirection:"column",gap:16}}><div><label style={S.label}>Empresa cliente</label><input style={S.input} value={co} onChange={e=>setCo(e.target.value)} placeholder="Insertar nombre de la empresa"/></div><div><label style={S.label}>Máximo de usuarios</label><input style={S.input} type="number" min="1" max="500" value={mx} onChange={e=>setMx(e.target.value)}/></div><div><label style={S.label}>Contraseña admin</label><input style={S.input} type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Para gestionar usuarios"/></div>{error&&<div style={S.error}>{error}</div>}<button style={S.btnPrimary} onClick={go}>Activar Prompt Studio</button></div></div></div>);
  };

  // Login
  const LoginScreen = () => {
    const [nm, setNm] = useState(""); const [em, setEm] = useState(""); const [adm, setAdm] = useState(false); const [ap, setAp] = useState("");
    const go = () => { setError("");
      if (adm) { if (ap===config.adminPass) { setCurrentUser({name:"Admin",email:"admin",isAdmin:true}); setScreen("app"); } else setError("Contraseña incorrecta"); return; }
      if (!nm.trim()||!em.trim()) { setError("Completá nombre y email"); return; }
      const ex = users.find(u=>u.email.toLowerCase()===em.trim().toLowerCase());
      if (ex) { setCurrentUser(ex); setScreen("app"); return; }
      if (users.length>=config.maxUsers) { setError("Límite de usuarios alcanzado."); return; }
      const nu = {name:nm.trim(),email:em.trim().toLowerCase(),isAdmin:false,joinedAt:new Date().toISOString()};
      const up = [...users,nu]; setUsers(up); store.set("pca_users",up); setCurrentUser(nu); setScreen("app");
    };
    return (<div style={S.loginWrap}><div style={S.loginCard}><div style={S.loginLogo}><div style={S.loginBrand}>Talento Impulsa</div><div style={S.loginTitle}>Prompt Studio PCA™</div><div style={S.loginSub}>{config.company}</div><div style={{...S.tag("#C8A951"),marginTop:12}}>Método PCA™ · C.R.E.F.</div></div>
    {!adm?(<div style={{display:"flex",flexDirection:"column",gap:16}}><div><label style={S.label}>Tu nombre</label><input style={S.input} value={nm} onChange={e=>setNm(e.target.value)} placeholder="Ej: María González"/></div><div><label style={S.label}>Email corporativo</label><input style={S.input} type="email" value={em} onChange={e=>setEm(e.target.value)} placeholder="Ej: maria@empresa.com"/></div>{error&&<div style={S.error}>{error}</div>}<button style={S.btnPrimary} onClick={go}>Ingresar</button><button style={S.btnSecondary} onClick={()=>{setAdm(true);setError("");}}>Acceso administrador</button><div style={{fontSize:11,color:"#B0A898",textAlign:"center"}}>{users.length}/{config.maxUsers} usuarios</div></div>)
    :(<div style={{display:"flex",flexDirection:"column",gap:16}}><div><label style={S.label}>Contraseña admin</label><input style={S.input} type="password" value={ap} onChange={e=>setAp(e.target.value)}/></div>{error&&<div style={S.error}>{error}</div>}<button style={S.btnPrimary} onClick={go}>Ingresar como admin</button><button style={S.btnSecondary} onClick={()=>{setAdm(false);setError("");}}>Volver</button></div>)}
    </div></div>);
  };

  if (screen==="loading") return <div style={S.loginWrap}><div style={{color:"#C8A951",fontSize:16}}>Cargando...</div></div>;
  if (screen==="setup") return <SetupScreen/>;
  if (screen==="login") return <LoginScreen/>;

  const catKeys = Object.keys(CATEGORIES);
  const activeCat = activeCategory?CATEGORIES[activeCategory]:null;
  const activeP = selectedPrompt?CATEGORIES[selectedPrompt.ck].prompts[selectedPrompt.i]:null;
  const totalP = Object.values(CATEGORIES).reduce((s,c)=>s+c.prompts.length,0);
  const logout = () => { setCurrentUser(null); setActiveCategory(null); setSelectedPrompt(null); setFieldValues({}); setGeneratedPrompt(""); setShowAdmin(false); setScreen("login"); };

  return (<div style={S.app}>
    <div style={S.header}>
      <div><div style={S.headerCompany}>{config.company}</div><h1 style={S.headerTitle}>Prompt Studio PCA™</h1></div>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <span style={S.headerUser}>{currentUser?.isAdmin?"⚙ Admin":currentUser?.name}</span>
        {currentUser?.isAdmin&&<button style={S.logoutBtn} onClick={()=>setShowAdmin(!showAdmin)}>{showAdmin?"Prompts":"Admin"}</button>}
        <button style={S.logoutBtn} onClick={logout}>Salir</button>
      </div>
    </div>

    {showAdmin&&currentUser?.isAdmin&&(<div style={{maxWidth:1100,margin:"0 auto",padding:16}}><div style={S.adminPanel}>
      <div style={{fontSize:13,fontWeight:700,color:"#8B6914",marginBottom:14}}>⚙ Administración — {config.company}</div>
      <div style={S.adminStat}>
        <div style={S.adminStatItem}><div style={S.adminStatNum}>{users.length}</div><div style={S.adminStatLabel}>Usuarios</div></div>
        <div style={S.adminStatItem}><div style={S.adminStatNum}>{config.maxUsers}</div><div style={S.adminStatLabel}>Máximo</div></div>
        <div style={S.adminStatItem}><div style={S.adminStatNum}>{config.maxUsers-users.length}</div><div style={S.adminStatLabel}>Cupos</div></div>
        <div style={S.adminStatItem}><div style={S.adminStatNum}>{totalP}</div><div style={S.adminStatLabel}>Prompts</div></div>
      </div>
      <div style={{marginTop:16}}><div style={{fontSize:12,fontWeight:700,color:"#6B5E4F"}}>Usuarios</div>
        <div style={{marginTop:6,maxHeight:180,overflowY:"auto"}}>
          {users.length===0&&<div style={{fontSize:12,color:"#B0A898",padding:6}}>Sin usuarios</div>}
          {users.map((u,i)=>(<div key={i} style={S.userItem}><div><b>{u.name}</b> <span style={{color:"#8B7D6B",marginLeft:4}}>{u.email}</span></div><button style={S.removeBtn} onClick={()=>{const up=users.filter(x=>x.email!==u.email);setUsers(up);store.set("pca_users",up);}}>Eliminar</button></div>))}
        </div>
      </div>
      <button style={{...S.removeBtn,padding:"8px 16px",fontSize:12,marginTop:16}} onClick={()=>{if(!confirm("¿Eliminar toda la configuración y usuarios?"))return;store.del("pca_config");store.del("pca_users");setConfig({company:"",maxUsers:10,adminPass:""});setUsers([]);setCurrentUser(null);setScreen("setup");}}>Reiniciar instancia</button>
    </div></div>)}

    {!showAdmin&&(<React.Fragment>
      <div style={S.catBar}>{catKeys.map(k=>(<button key={k} style={S.catBtn(activeCategory===k,CATEGORIES[k].color)} onClick={()=>{setActiveCategory(k);setSelectedPrompt(null);setGeneratedPrompt("");setFieldValues({});}}><span>{CATEGORIES[k].icon}</span>{CATEGORIES[k].label}</button>))}</div>
      <div style={S.main}>
        {!activeCategory&&(<div style={{textAlign:"center",padding:"40px 16px"}}><div style={{fontSize:32,marginBottom:10}}>✦</div><h2 style={{fontSize:19,fontWeight:700,color:"#4A3F35",margin:0}}>Bienvenido al Prompt Studio PCA™</h2><p style={{color:"#8B7D6B",fontSize:13,marginTop:6,maxWidth:460,margin:"6px auto 0"}}>{totalP} prompts en {catKeys.length} categorías con sistema C.R.E.F.</p><div style={{display:"flex",justifyContent:"center",gap:6,marginTop:16,flexWrap:"wrap"}}>{["C · Contexto","R · Rol","E · Especificación","F · Formato"].map((it,i)=>(<span key={i} style={S.tag(["#C8A951","#4A90D9","#5B8C5A","#D4694A"][i])}>{it}</span>))}</div></div>)}

        {activeCategory&&activeCat&&(<React.Fragment><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{fontSize:24}}>{activeCat.icon}</span><div><div style={{fontSize:13,fontWeight:700,color:"#6B5E4F"}}>{activeCat.label}</div><div style={{fontSize:11,color:"#B0A898"}}>{activeCat.prompts.length} prompts</div></div></div>
          <div style={S.grid}>{activeCat.prompts.map((p,i)=>(<div key={i} style={S.card(selectedPrompt?.ck===activeCategory&&selectedPrompt?.i===i)} onClick={()=>{setSelectedPrompt({ck:activeCategory,i});setFieldValues({});setGeneratedPrompt("");setCopied(false);}}><div style={S.cardNum}>#{i+1}</div><div style={S.cardTitle}>{p.title}</div><div style={S.cardDesc}>{p.desc}</div></div>))}</div></React.Fragment>)}

        {activeP&&(<div style={S.builder}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}><div><div style={S.builderTitle}>{activeP.title}</div><div style={S.builderDesc}>{activeP.desc}</div></div><span style={S.tag(CATEGORIES[selectedPrompt.ck].color)}>C.R.E.F.</span></div>
          <div style={S.fieldsGrid}>{activeP.fields.map((f,i)=>(<div key={i} style={f.type==="textarea"?S.fieldFull:{}}><label style={S.label}>{f.label}</label>{f.type==="textarea"?<textarea style={S.textarea} placeholder={f.placeholder} value={fieldValues[f.id]||""} onChange={e=>setFieldValues({...fieldValues,[f.id]:e.target.value})}/>:<input style={S.input} placeholder={f.placeholder} value={fieldValues[f.id]||""} onChange={e=>setFieldValues({...fieldValues,[f.id]:e.target.value})}/>}</div>))}</div>
          <div style={{display:"flex",gap:8,marginTop:16}}><button style={{...S.btnPrimary,width:"auto",padding:"10px 24px"}} onClick={()=>{const p=CATEGORIES[selectedPrompt.ck].prompts[selectedPrompt.i];const v={};p.fields.forEach(f=>{v[f.id]=fieldValues[f.id]||"["+f.label+"]";});setGeneratedPrompt(p.template(v));}}>✦ Generar Prompt</button><button style={{...S.btnSecondary,width:"auto",padding:"8px 18px",marginTop:0}} onClick={()=>{setFieldValues({});setGeneratedPrompt("");}}>↺ Reiniciar</button></div>
          {generatedPrompt&&(<div style={S.outputBox}><div style={S.outputHeader}><span style={S.outputLabel}>Prompt generado</span><button style={S.copyBtn} onClick={()=>handleCopy(generatedPrompt,setCopied)}>{copied?"✓ Copiado":"Copiar"}</button></div><div style={S.outputText}>{generatedPrompt}</div></div>)}
        </div>)}

        {activeCategory&&(<div style={S.libreSection}>
          <div style={{fontSize:15,fontWeight:700}}>✦ Constructor Libre C.R.E.F.</div><p style={{fontSize:11,color:"#8B7D6B",marginTop:3}}>Construí cualquier prompt desde cero</p>
          <div style={S.crefGrid}>{[{k:"C",l:"Contexto",h:"¿Situación?",p:"Ej: Soy gerente de ventas..."},{k:"R",l:"Rol",h:"¿Papel de la IA?",p:"Ej: Actuá como consultor..."},{k:"E",l:"Especificación",h:"¿Qué hacer?",p:"Ej: Redactá una propuesta..."},{k:"F",l:"Formato",h:"¿Cómo presentar?",p:"Ej: Documento con encabezado..."}].map(it=>(<div key={it.k}><label style={S.label}><span style={S.crefBadge(it.k)}>{it.k}</span>{it.l} <span style={{fontWeight:400,color:"#B0A898"}}>— {it.h}</span></label><textarea style={S.textarea} rows={3} placeholder={it.p} value={libre[it.k]} onChange={e=>setLibre({...libre,[it.k]:e.target.value})}/></div>))}</div>
          <div style={{display:"flex",gap:8,marginTop:14}}><button style={{...S.btnPrimary,width:"auto",padding:"10px 24px"}} onClick={()=>{const p=[];if(libre.R)p.push(libre.R);if(libre.C)p.push("\nContexto: "+libre.C);if(libre.E)p.push("\nTarea: "+libre.E);if(libre.F)p.push("\nFormato: "+libre.F);setLibreOutput(p.join("\n")||"Completá al menos un campo.");}}>✦ Generar C.R.E.F.</button><button style={{...S.btnSecondary,width:"auto",padding:"8px 18px",marginTop:0}} onClick={()=>{setLibre({C:"",R:"",E:"",F:""});setLibreOutput("");}}>↺ Reiniciar</button></div>
          {libreOutput&&(<div style={{...S.outputBox,marginTop:14}}><div style={S.outputHeader}><span style={S.outputLabel}>Prompt C.R.E.F.</span><button style={S.copyBtn} onClick={()=>handleCopy(libreOutput,setLibreCopied)}>{libreCopied?"✓ Copiado":"Copiar"}</button></div><div style={S.outputText}>{libreOutput}</div></div>)}
        </div>)}

        <div style={S.footer}>
          <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>{["C · Contexto","R · Rol","E · Especificación","F · Formato"].map((it,i)=>(<span key={i} style={S.tag(["#C8A951","#4A90D9","#5B8C5A","#D4694A"][i])}>{it}</span>))}</div>
          <p style={{margin:0}}>Prompt Studio PCA™ · <strong>Talento Impulsa Consulting</strong></p>
          <p style={{margin:"3px 0 0",fontSize:10,opacity:.5}}>{totalP} prompts · {catKeys.length} categorías · Constructor libre C.R.E.F.</p>
        </div>
      </div>
    </React.Fragment>)}
  </div>);
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
